# Pre-Crime / Goose user config -- AUTO-GENERATED by goose.bat on every launch.
# Edit this template (NOT the file in %APPDATA%\Block\goose\config).
# goose.bat replaces the project-root placeholder with the launching folder and
# the model placeholder with $GOOSE_MODEL (default google/gemini-3-flash-preview,
# override via llm.model in precrime_config.json).
extensions:
  todo:
    enabled: false
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
  tom:
    enabled: true
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  summon:
    enabled: false
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  extensionmanager:
    enabled: false
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  analyze:
    enabled: false
    type: platform
    name: analyze
    description: 'Analyze code structure with tree-sitter: directory overviews, file details, symbol call graphs'
    display_name: Analyze
    bundled: true
    available_tools: []
  orchestrator:
    enabled: false
    type: platform
    name: orchestrator
    description: 'Manage agent sessions: list, view, start, send messages, interrupt, and stop agents'
    display_name: Orchestrator
    bundled: true
    available_tools: []
  skills:
    enabled: false
    type: platform
    name: skills
    description: Discover and provide skill instructions from filesystem and builtins
    display_name: Skills
    bundled: true
    available_tools: []
  developer:
    enabled: true
    type: platform
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    bundled: true
    available_tools: []
  chatrecall:
    enabled: false
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  summarize:
    enabled: false
    type: platform
    name: summarize
    description: Load files/directories and get an LLM summary in a single call
    display_name: Summarize
    bundled: true
    available_tools: []
  tavily:
    enabled: true
    type: stdio
    name: tavily
    description: Tavily wrapper that trims response bloat (50-86% smaller). Tools tavily_search and tavily_extract.
    cmd: python
    args:
    - __PROJECT_ROOT__\tools\tavily_lean_mcp.py
    envs: {}
    env_keys: []
    timeout: 60
    bundled: null
    available_tools: []
  chrome:
    # Disabled: Tavily (above) covers headless scraping. chrome is streamable_http
    # to the shared mcp-chrome bridge (:12306); when another client already holds
    # that transport it returns HTTP 500 "Already connected to a transport" at
    # startup. Re-enable only for browser-gated sources (fb/ig) with the bridge free.
    enabled: false
    type: streamable_http
    name: chrome
    description: mcp-chrome (Chrome MCP Server). Drives your installed, logged-in Chrome via the companion extension. Tools chrome_navigate, chrome_get_web_content, etc. Requires mcp-chrome-bridge installed + the extension running (serves http://127.0.0.1:12306).
    uri: http://127.0.0.1:12306/mcp
    envs: {}
    env_keys: []
    headers: {}
    timeout: 60
    bundled: null
    available_tools: []
  precrime:
    enabled: true
    type: streamable_http
    name: precrime
    description: Pre-Crime workflow tools - pipeline, find, trades
    uri: http://127.0.0.1:5179/mcp
    envs: {}
    env_keys: []
    headers: {}
    timeout: 60
    bundled: null
    available_tools: []
  precrime-rss:
    enabled: true
    type: stdio
    name: precrime-rss
    description: RSS article fetcher/scorer -- get_top_articles
    cmd: node
    args:
    - __PROJECT_ROOT__\rss\rss-scorer-mcp\index.js
    envs: {}
    env_keys: []
    timeout: 30
    bundled: null
    available_tools: []
  gmail:
    enabled: true
    type: stdio
    name: gmail
    description: Gmail send tool. Receives OAuth token from Chrome extension on port 3001. Use draft=true for human review before send.
    cmd: node
    args:
    - __PROJECT_ROOT__\server\mcp\mcp_gmail.js
    envs: {}
    env_keys: []
    timeout: 60
    bundled: null
    available_tools: []
OPENROUTER_HOST: https://openrouter.ai
GOOSE_PROVIDER: openrouter
GOOSE_MODEL: __GOOSE_MODEL__
GOOSE_TELEMETRY_ENABLED: false
GOOSE_MODE: auto
